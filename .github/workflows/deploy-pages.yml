name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "viewer/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync viewer/ → docs/
        run: |
          cp viewer/index.html docs/index.html
          cp viewer/pale.json  docs/pale.json
          # roads.pmtiles は docs/ に直接コミット済み（viewer/ には含めない）

      - name: Commit docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "docs: sync viewer"
          git push
